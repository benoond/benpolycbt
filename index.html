<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenPoly CBT - Login</title>
    <link rel="icon" type="image/jpg" href="logo.jpg">
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Background Layout */
        .login-wrapper {
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                              url('bakgrd.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Center Login Card */
        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 460px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* App Logo Box */
        .logo-box {
            width: 65px;
            height: 65px;
            background-color: skyblue;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px;
            box-shadow: 0 4px 10px rgba(13, 27, 62, 0.3);
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            fill: #ffffff;
        }

        .logo-text {
            color: #ffffff;
            font-size: 0.45rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-top: 2px;
            text-transform: uppercase;
        }

        /* Headers */
        .main-heading {
            color: #111111;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .sub-heading {
            color: #555555;
            font-size: 0.88rem;
            line-height: 1.42;
            text-align: center;
            margin-bottom: 28px;
            max-width: 340px;
        }

        /* Form Controls */
        .form-container {
            width: 100%;
        }

        /* Group wrapper replicating the notched-outline design */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group label {
            position: absolute;
            left: 12px;
            top: -9px;
            background-color: #ffffff;
            padding: 0 6px;
            font-size: 0.78rem;
            color: #757575;
            transition: color 0.2s ease;
            pointer-events: none;
            z-index: 10;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            color: #111111;
            background: transparent;
            border: 1.5px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Focused Input States */
        .input-group:focus-within label {
            color: #1d82dc;
        }

        .input-group.active-blue .input-field {
            border-color: #1d82dc;
            box-shadow: 0 0 0 1px #1d82dc;
        }

        /* Password Specific adjustments */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #757575;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .password-toggle:hover {
            color: #333333;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Custom Dropdown Styling */
        select.input-field {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M7 10l5 5 5-5z' fill='%23555555'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 18px;
            cursor: pointer;
        }

        /* Help links bar */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 26px;
            font-size: 0.88rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333333;
            cursor: pointer;
            user-select: none;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: #1d82dc;
            cursor: pointer;
        }

        .forgot-link {
            color: #1d82dc;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Action Buttons */
        .login-btn {
            width: 100%;
            background-color: #1d82dc;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(29, 130, 220, 0.3);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .login-btn:hover {
            background-color: #156bba;
        }

        .login-btn:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="logo-box">
                <!-- <svg class="logo-icon" viewBox="0 0 24 24">
                    <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.18 11.3l6.82 3.72 6.82-3.72L12 15l-6.82-3.7z"/>
                </svg>
                <div class="logo-text">High School</div> -->
                <img src="logo.jpg" alt="logo" width="100%">
            </div>

            <h1 class="main-heading">BenPoly CBT Platform</h1>
            <p class="sub-heading">Welcome to the BenPoly Computer-Based Testing Platform. Please sign in to continue.</p>

            <form class="form-container" id="loginForm" onsubmit="handleFormSubmit(event)">
                
                <div class="input-group active-blue">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="input-field" value="Tom" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="input-field" value="password123" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            <svg id="eyeIcon" viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" checked>
                        Remember Me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <div class="input-group">
                    <!-- <label for="role">Role</label>
                    <select id="role" class="input-field">
                        <option value="student" selected>Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Administrator</option>
                    </select> -->
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

        </div>
    </div>

    <script>
        // Password visibility toggler mechanism
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePasswordBtn.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            
            // Adjust SVG pattern based on active viewing state
            if (isPassword) {
                eyeIcon.innerHTML = `<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.01-.16c0-1.66-1.34-3-3-3l-.16.01z"/>`;
            } else {
                eyeIcon.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>`;
            }
        });

        // Form confirmation logging
        function handleFormSubmit(event) {
            event.preventDefault();
            window.location.href = "cbt.html";
            /* const user = document.getElementById('username').value;
            const role = document.getElementById('role').value;
            alert(`Authentication Successful!\nWelcome back ${user}. Accessing the examination workspace secure portal as [${role.toUpperCase()}].`); */
        }
    </script>
</body>
</html>
