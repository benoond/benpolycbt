<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenPoly CBT</title>

<link rel="icon" href="logo.jpg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    min-height:100vh;
    background:url("bakgrd.png") center/cover no-repeat;
}

.login-wrapper{
    min-height:100vh;
    background:rgba(0,0,0,.35);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.login-card{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    width:80px;
    display:block;
    margin:auto;
    margin-bottom:10px;
}

h2{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:20px;
    font-size:.9rem;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#555;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#1d82dc;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#1d82dc;
    color:#fff;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#1569b3;
}

.alert{
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

.alert-danger{
    background:#ffe9e9;
    color:#b10000;
    border-left:5px solid red;
}

.success-card{
    text-align:center;
}

.check{
    width:45px;
    height:45px;
    background:#28a745;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    border-radius:50%;
    font-size:24px;
    margin-bottom:15px;
}

.student-table{
    margin-top:20px;
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #eee;
}

.row:last-child{
    border-bottom:none;
}

.start-btn{
    display:block;
    margin-top:20px;
    background:#1d82dc;
    color:#fff;
    padding:15px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

#successScreen{
    display:none;
}
</style>

</head>
<body>

<div class="login-wrapper">

<div class="login-card">

<img src="logo.jpg" class="logo">

<h2>BenPoly CBT Platform</h2>

<p class="subtitle">
Welcome to the BenPoly Computer Based Test Platform
</p>

<div id="loginScreen">

<div id="errorBox" class="alert alert-danger" style="display:none;"></div>

<form id="loginForm">

<div class="input-group">
<label>Exam PIN</label>
<input
type="text"
id="pin"
placeholder="Enter Pin"
value="20250001"
required>
</div>

<div class="input-group">
<label>Name (Any one of your names)</label>
<input
type="text"
id="name"
placeholder="Enter any one of your names"
value="John"
required>
</div>

<button type="submit">
Verify PIN
</button>

</form>

</div>

<div id="successScreen">

<div class="success-card">

<div class="check">✓</div>

<h2 style="color:green">
Verification Successful
</h2>

<div id="message1" style="color:red;font-weight:bold;margin-top:15px"></div>

<div class="student-table">

<div class="row">
<span>Exam</span>
<span style="color:red;">GNS 101 </span>
</div>

<div class="row">
<span>Student Name</span>
<span>John Doe</span>
</div>

<div class="row">
<span>Registration No.</span>
<span>BEN/2025/001</span>
</div>

<div class="row">
<span>Course</span>
<span>Computer Science</span>
</div>

<div class="row">
<span>Department</span>
<span>Computer Science</span>
</div>

<div class="row">
<span>Class</span>
<span>ND II</span>
</div>

</div>

<div id="buttonContainer"></div>

</div>

</div>

</div>

</div>

<script>

const form = document.getElementById("loginForm");
const loginScreen = document.getElementById("loginScreen");
const successScreen = document.getElementById("successScreen");
const errorBox = document.getElementById("errorBox");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const pin = document.getElementById("pin").value.trim();
    const name = document.getElementById("name").value.trim();

    // Example validation
    if(pin === "20250001" && name.toLowerCase() === "john"){

        loginScreen.style.display="none";
        successScreen.style.display="block";

        startCountdown();

    }else{

        errorBox.style.display="block";
        errorBox.innerHTML="Invalid PIN or Name.";

    }

});

function startCountdown(){

    let examStart = 10;

    const buttonContainer = document.getElementById("buttonContainer");
    const message = document.getElementById("message1");

    const timer = setInterval(function(){

        if(examStart<=0){

            clearInterval(timer);

            message.innerHTML="You can START NOW";

            buttonContainer.innerHTML=`
            <a href="cbt.html" class="start-btn">
            Start Examination
            </a>
            `;

            return;
        }

        message.innerHTML="Time Remaining to start " + examStart + "s";

        examStart--;

    },1000);

}

</script>

</body>
</html>
